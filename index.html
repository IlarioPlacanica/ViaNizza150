<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presentazione Via Nizza 150</title>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Widgets/widgets.css"
          rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="cesiumContainer"></div>

    <header class="top-header">
        <div class="top-header-inner">
            <div class="top-header-copy">
                <div class="ui-eyebrow">Interactive Building Overview</div>
                <h1 class="top-header-title">VIA NIZZA 150, TORINO</h1>
            </div>
            <div class="top-header-meta">
                Lot status, lot availability and spatial overview
            </div>
        </div>
    </header>

    <div id="legendPanel" class="legend-panel">
        <h3>Legenda</h3>

        <div class="legend-item">
            <span class="legend-color" style="background: rgba(255, 0, 0, 0.55);"></span>
            <span>LOCATA</span>
        </div>

        <div class="legend-item">
            <span class="legend-color" style="background: rgba(115, 191, 255, 0.55);"></span>
            <span>SFITTA LOCABILE</span>
        </div>

        <div class="legend-item">
            <span class="legend-color" style="background: rgba(0, 128, 0, 0.55);"></span>
            <span>AREE COMUNI AI LOTTI</span>
        </div>
    </div>

    <div id="filterBar" class="filter-bar">
        <button onclick="setActiveFilter(this); showAllLotti(); renderTotalSurfaceInfo()">MOSTRA TUTTI</button>
        <button class="active" onclick="setActiveFilter(this); hideAllLotti(); closeInfoPanel()">NASCONDI TUTTI</button>
        <button onclick="setFilterAndShowCategory(this, 'rosso')">LOCATA</button>
        <button onclick="setFilterAndShowCategory(this, 'azzurro')">SFITTA LOCABILE</button>
        <button onclick="setActiveFilter(this); renderPostiAutoInfo()">POSTI AUTO</button>
        <button onclick="setActiveFilter(this); showOnlyCategory('verde'); renderNonLocabileTotalInfo()">SFITTA NON LOCABILE</button>
    </div>

    <div id="infoPanel" class="info-panel hidden">
        <button id="closePanel" aria-label="Chiudi pannello">✕</button>

        <div class="info-panel-header">
            <div class="info-eyebrow" id="infoEyebrow">Dettaglio</div>
            <h2 id="lotTitle">Lotto</h2>
        </div>

        <div id="infoPanelBody"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
